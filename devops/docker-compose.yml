version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: manas360-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: manas360
      POSTGRES_USER: manas360
      POSTGRES_PASSWORD: manas360
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: manas360-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
