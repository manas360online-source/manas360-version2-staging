version: '3.8'
services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: manas360
      POSTGRES_PASSWORD: manas360
      POSTGRES_DB: manas360
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manas360"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
