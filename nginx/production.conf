# Nginx production config for manas360.com
# Serves React frontend, proxies /api to backend, enforces HTTPS, www redirect, gzip, security headers

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream manas360_backend {
    server 127.0.0.1:5000;
    keepalive 64;
}

upstream manas360_ai_engine {
    server 127.0.0.1:8765;
    keepalive 16;
}

server {
    listen 80;
    server_name manas360.com www.manas360.com;
    return 301 https://manas360.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name manas360.com;

    root /var/www/manas360/frontend/dist;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/manas360.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/manas360.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /api/ {
        proxy_pass http://manas360_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_cache_bypass $http_upgrade;
    }

    location / {
        try_files $uri $uri/ /index.html;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location /ws/ {
        proxy_pass http://manas360_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
    }

    # AI Engine WebSocket — therapist audio → Python analysis pipeline
    # Clients connect to wss://manas360.com/ai-engine
    location /ai-engine {
        proxy_pass http://manas360_ai_engine;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    access_log /var/log/nginx/manas360.access.log;
    error_log /var/log/nginx/manas360.error.log;
}

# Redirect all www and http to https://manas360.com
server {
    listen 443 ssl http2;
    server_name www.manas360.com;
    ssl_certificate /etc/letsencrypt/live/manas360.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/manas360.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    return 301 https://manas360.com$request_uri;
}
