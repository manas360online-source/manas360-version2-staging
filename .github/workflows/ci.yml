name: CI

on:
  push:
    branches: [ main, master, develop, staging, sync/staging-docker ]
  pull_request:
    branches: [ main, master, develop, staging ]

jobs:
  validate-lockfiles:
    runs-on: ubuntu-latest
    name: Validate Lockfile Sync
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check backend lockfile sync
        working-directory: backend
        run: npm install --package-lock-only --dry-run && echo "✅ Backend lockfile is in sync"

      - name: Check frontend lockfile sync
        working-directory: frontend
        run: npm install --package-lock-only --dry-run && echo "✅ Frontend lockfile is in sync"

  backend:
    runs-on: ubuntu-latest
    needs: validate-lockfiles
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: manas360_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d manas360_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/manas360_ci?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/manas360_ci?schema=public
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npm run prisma:generate

      - name: Apply database migrations
        working-directory: backend
        run: npm run prisma:migrate:deploy

      - name: Seed baseline login users
        working-directory: backend
        run: npm run seed:login-users

      - name: Enforce single platform admin
        working-directory: backend
        run: npm run guard:single-admin

      - name: Run npm audit
        working-directory: backend
        run: npm audit --audit-level=moderate || true

      - name: Typecheck
        working-directory: backend
        run: npm run typecheck

      - name: Run targeted tests
        working-directory: backend
        run: npx jest --runInBand tests/lib/branching.integration.test.ts -i

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Frontend build
        working-directory: frontend
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    name: Deploy to EC2
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            echo "Connected to EC2"
            
            cd ~/manas360-version2-staging
            
            git pull origin main
            docker-compose down
            docker-compose up -d --build
            
            echo "✅ Deployment complete"
