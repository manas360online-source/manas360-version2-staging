name: Staging Deploy

on:
  push:
    branches:
      - develop
      - main
      - master
      - staging
      - sync/staging-docker
  workflow_dispatch:

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build backend
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Deploy to AWS Lightsail via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            cd /var/www/manas360
            BRANCH_NAME='${{ github.ref_name }}' ROOT_DIR='${{ vars.STAGING_APP_DIR || '/var/www/manas360' }}' bash ./devops/scripts/deploy.sh

      - name: Seed staging database
        if: ${{ vars.RUN_STAGING_SEED == 'true' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            cd /var/www/manas360
            ROOT_DIR='${{ vars.STAGING_APP_DIR || '/var/www/manas360' }}' bash ./devops/scripts/seed.sh
