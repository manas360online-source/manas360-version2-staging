name: Staging Deploy

on:
  push:
    branches:
      - develop
      - main
      - master
      - staging
      - sync/staging-docker
  workflow_dispatch:

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required staging secrets and vars
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
          LIGHTSAIL_SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          STAGING_APP_DIR: ${{ vars.STAGING_APP_DIR }}
        run: |
          set -euo pipefail

          missing=0

          if [ -z "${LIGHTSAIL_HOST}" ]; then
            echo "::error::Missing required secret: LIGHTSAIL_HOST"
            missing=1
          fi

          if [ -z "${LIGHTSAIL_USER}" ]; then
            echo "::error::Missing required secret: LIGHTSAIL_USER"
            missing=1
          fi

          if [ -z "${LIGHTSAIL_SSH_KEY}" ]; then
            echo "::error::Missing required secret: LIGHTSAIL_SSH_KEY"
            missing=1
          fi

          if [ -z "${STAGING_APP_DIR}" ]; then
            echo "::warning::Repository variable STAGING_APP_DIR is not set. Default '/var/www/manas360' will be used."
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Validate deploy script syntax
        run: |
          set -euo pipefail
          bash -n devops/scripts/deploy.sh
          bash -n devops/scripts/seed.sh

  deploy:
    needs: preflight
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build backend
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Deploy to AWS Lightsail via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            cd /var/www/manas360
            BRANCH_NAME='${{ github.ref_name }}' ROOT_DIR='${{ vars.STAGING_APP_DIR || '/var/www/manas360' }}' bash ./devops/scripts/deploy.sh

      - name: Seed staging database
        if: ${{ vars.RUN_STAGING_SEED == 'true' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            cd /var/www/manas360
            ROOT_DIR='${{ vars.STAGING_APP_DIR || '/var/www/manas360' }}' bash ./devops/scripts/seed.sh
