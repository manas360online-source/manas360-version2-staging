name: Staging Deploy

on:
  push:
    branches:
      - develop
      - main
      - master
      - staging
      - sync/staging-docker
  workflow_dispatch:

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      ec2-host: ${{ steps.validate.outputs.ec2-host }}
      ec2-user: ${{ steps.validate.outputs.ec2-user }}
      staging-dir: ${{ steps.validate.outputs.staging-dir }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required staging secrets and vars
        id: validate
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_KEY: ${{ secrets.EC2_KEY }}
          STAGING_APP_DIR: ${{ vars.STAGING_APP_DIR }}
        run: |
          set -euo pipefail

          missing=0

          if [ -z "${EC2_HOST}" ]; then
            echo "::error::Missing required secret: EC2_HOST"
            missing=1
          fi

          if [ -z "${EC2_USER}" ]; then
            echo "::error::Missing required secret: EC2_USER"
            missing=1
          fi

          if [ -z "${EC2_KEY}" ]; then
            echo "::error::Missing required secret: EC2_KEY"
            missing=1
          fi

          if [ -z "${STAGING_APP_DIR}" ]; then
            echo "::warning::Repository variable STAGING_APP_DIR is not set. Default '/var/www/manas360' will be used."
            STAGING_APP_DIR="/var/www/manas360"
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          
          # Output to job outputs for use in deploy job
          echo "ec2-host=${EC2_HOST}" >> $GITHUB_OUTPUT
          echo "ec2-user=${EC2_USER}" >> $GITHUB_OUTPUT
          echo "staging-dir=${STAGING_APP_DIR}" >> $GITHUB_OUTPUT

      - name: Validate deploy script exists
        run: |
          set -euo pipefail
          echo "Deployment validation passed"

  deploy:
    needs: preflight
    runs-on: ubuntu-latest
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_KEY: ${{ secrets.EC2_KEY }}
      STAGING_APP_DIR: ${{ vars.STAGING_APP_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build backend
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key: ${{ env.EC2_KEY }}
          script: |
            set -e
            cd ~/manas360-version2-staging
            
            echo "Syncing with GitHub..."
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
            
            docker-compose down
            docker-compose up -d --build
            
            echo "✅ Deployment complete"

      # Optional: Seed staging database if needed
      # Uncomment and configure if you want automated seeding
      # - name: Seed staging database
      #   if: ${{ vars.RUN_STAGING_SEED == 'true' }}
      #   uses: appleboy/ssh-action@v1.0.3
      #   with:
      #     host: ${{ env.EC2_HOST }}
      #     username: ${{ env.EC2_USER }}
      #     key: ${{ env.EC2_KEY }}
      #     script: |
      #       cd ~/manas360-version2-staging
      #       npm run seed
