services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: manas360
      POSTGRES_PASSWORD: manas360
      POSTGRES_DB: manas360
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manas360"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    command: redis-server --appendonly yes
    # Do not publish Redis host port by default; expose internally to the Docker
    # network so the backend can connect to `redis:6379` while allowing a local
    # Redis instance to continue running on the host.
    expose:
      - "6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://manas360:manas360@db:5432/manas360
      REDIS_URL: redis://redis:6379
      PRISMA_CLIENT_ENGINE_TYPE: binary
      PORT: 5000
      API_URL: http://localhost:${BACKEND_HOST_PORT:-5001}
      FRONTEND_URL: http://localhost:${FRONTEND_HOST_PORT:-3000}
      CORS_ORIGIN: http://localhost:${FRONTEND_HOST_PORT:-3000}
      ADMIN_SEED_ENABLED: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "${BACKEND_HOST_PORT:-5001}:5000"
    command: sh -c "npx prisma migrate deploy && node dist/server.js"

  ai_engine:
    build:
      context: ./backend/ai_engine
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_BACKEND_URL: http://backend:5000
    depends_on:
      - backend
    ports:
      - "${AI_ENGINE_HOST_PORT:-8765}:8765"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:80"

volumes:
  postgres_data:
  redis_data:
