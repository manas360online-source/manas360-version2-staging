services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: manas360
      POSTGRES_PASSWORD: manas360
      POSTGRES_DB: manas360
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manas360"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

