global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']

  - job_name: 'manas360_backend'
    metrics_path: /metrics
    static_configs:
      # backend running locally; docker container will use host.docker.internal
      - targets: ['host.docker.internal:4000']

  - job_name: 'redis_exporter'
    static_configs:
      - targets: ['redis_exporter:9121']
